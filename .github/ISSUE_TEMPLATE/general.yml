name: General Issue
description: Report a bug, suggest a feature, or raise a general issue
body:
  - type: dropdown
    id: issue-type
    attributes:
      label: "📝 Issue Type"
      description: "Select the type of issue"
      options:
        - "🛑 Bug / Issue"
        - "❓ Suggestion / Feature Request"
        - "🛠️ Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "📖 Description"
      description: "Describe the issue in detail"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "🔄 Steps to Reproduce (If reporting a bug)"
      description: "How can we reproduce the issue?"
      placeholder: |
        1. Go to '...'
        2. Do '....'
        3. See error

  - type: textarea
    id: expected
    attributes:
      label: "✅ Expected Behavior"
      description: "What did you expect to happen?"

  - type: textarea
    id: screenshots
    attributes:
      label: "📸 Screenshots & Additional Context"
      description: "Add any screenshots or additional context here"
